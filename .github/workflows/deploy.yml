name: Deploy plugins to Netlify

on:
  push:
    branches:
      - release

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Create update-server directory
        run: mkdir update-server

      - name: Copy plugin files
        run: cp plugins/*.js update-server/

      - name: Generate version.json
        run: |
          echo "{" > update-server/version.json
          for file in plugins/*.js; do
            name=$(basename "$file" .js)
            version=$(grep "@version" "$file" | head -n1 | sed -E 's/.*@version\s+([0-9.]+).*/\1/')
            echo "  \"$name\": {" >> update-server/version.json
            echo "    \"version\": \"$version\"," >> update-server/version.json
            echo "    \"download_url\": \"https://rpgmakeruploader.netlify.app/$name.js\"" >> update-server/version.json
            echo "  }," >> update-server/version.json
          done
          sed -i '$ s/},/}/' update-server/version.json
          echo "}" >> update-server/version.json

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./update-server
          production-branch: release
          production-deploy: true
          deploy-message: "Auto-deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: edde862c-4cfd-4e03-a644-0ae7431b68ce
